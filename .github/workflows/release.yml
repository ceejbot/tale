name: release
permissions:
    contents: read

on:
    push:
        tags:
            - "v**[0-9]+.[0-9]+.[0-9]+*"
    workflow_dispatch:
        inputs:
            ref_name:
                type: string
                description: the refname to build a release from
                default: "latest"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

jobs:
    preflight:
        permissions:
            contents: write
        name: preflight
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                persist-credentials: false

            - name: get stable + nightly Rust
              uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
              with:
                  toolchain: nightly, stable
                  target: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu
                  components: clippy, rustfmt
                  cache-directories: |
                      ~/.cargo/registry
                      ~/.cargo/bin
                      target
                  cache: false

            - name: consult Clippy
              run: cargo +stable clippy --all-targets

            - name: check formatting
              run: cargo +nightly fmt --check --all

            - name: set ref_name
              shell: bash
              run: |
                  if [ -n "${INPUTS_REF_NAME}" ]; then
                    echo "REF_NAME=${INPUTS_REF_NAME}" >> $GITHUB_ENV
                  else
                    echo "REF_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV
                  fi
              env:
                INPUTS_REF_NAME: ${{ inputs.ref_name }}

            - name: create github release
              continue-on-error: true # for testing
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  release_url=$(gh release create $REF_NAME --generate-notes)

    release-linux:
        permissions:
            contents: write
        name: release-linux
        runs-on: ubuntu-latest
        needs: preflight
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                persist-credentials: false

            - name: get stable Rust
              uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
              with:
                  toolchain: stable
                  cache-directories: |
                      ~/.cargo/registry
                      ~/.cargo/bin
                      target
                  cache: false

            - name: build for release and upload
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  INPUTS_REF_NAME: ${{ inputs.ref_name }}
              run: |
                  REF_NAME="${GITHUB_REF_NAME}"
                  if [ -n "${INPUTS_REF_NAME}" ]; then
                      REF_NAME="${INPUTS_REF_NAME}"
                  fi
                  cargo +stable build --release
                  TARBALL=tale-x86_64-unknown-linux-gnu.tar.gz
                  tar czf "$TARBALL" --strip-components=2  target/release/tale
                  gh release upload "$REF_NAME" "$TARBALL"

                  digest=$(shasum -a 256 "$TARBALL")
                  shasum=$(echo "$digest" | { read -r first rest; echo "$first"; } )
                  echo $shasum > "$TARBALL".sha256
                  gh release upload "$REF_NAME" "$TARBALL".sha256

    release-macos:
        permissions:
            contents: write
        name: release-macos
        runs-on: macos-latest
        needs: preflight
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                persist-credentials: false

            - name: get stable Rust
              uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
              with:
                  toolchain: stable
                  target: aarch64-apple-darwin, x86_64-apple-darwin
                  cache-directories: |
                      ~/.cargo/registry
                      ~/.cargo/bin
                      target
                  cache: false

            - name: build for release
              run: |
                  cargo +stable build --release --target aarch64-apple-darwin
                  cargo +stable build --release --target x86_64-apple-darwin

            - name: upload release assets
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  INPUTS_REF_NAME: ${{ inputs.ref_name }}
              run: |
                  REF_NAME="${GITHUB_REF_NAME}"
                  if [ -n "${INPUTS_REF_NAME}" ]; then
                      REF_NAME="${INPUTS_REF_NAME}"
                  fi
                  TARBALL=tale-aarch64-apple-darwin.tar.gz
                  tar czf "$TARBALL" --strip-components=2  target/release/tale
                  gh release upload "$REF_NAME" "$TARBALL"

                  digest=$(shasum -a 256 "$TARBALL")
                  shasum=$(echo "$digest" | { read -r first rest; echo "$first"; } )
                  echo $shasum > "$TARBALL".sha256
                  gh release upload "$REF_NAME" "$TARBALL".sha256

    postflight:
        permissions:
            contents: write
        name: postflight
        runs-on: ubuntu-latest
        needs:
            #n- release-linux
            - release-macos
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                persist-credentials: false

            - name: get formulaic on path
              shell: bash
              run: |
                  curl -sLo formulaic.tgz https://github.com/ceejbot/formulaic/releases/latest/download/formulaic-x86_64-unknown-linux-gnu.tar.gz
                  tar --strip-components=3 -xzf formulaic.tgz ./target/release/formulaic

            - name: set ref_name
              shell: bash
              run: |
                  if [ -n "${INPUTS_REF_NAME}" ]; then
                    echo "REF_NAME=${INPUTS_REF_NAME}" >> "$GITHUB_ENV"
                  else
                    echo "REF_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
                  fi
              env:
                INPUTS_REF_NAME: ${{ inputs.ref_name }}

            - name: publish the draft release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: gh release edit "$REF_NAME" --draft=false

            - name: update the homebrew tap
              env:
                  GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
                  GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  formula_file=$(./formulaic ./Cargo.toml)
                  gh repo clone ceejbot/homebrew-tap
                  cd homebrew-tap || exit 1
                  cp "../$formula_file" Formula/
                  git add Formula/"$formula_file"
                  git config user.name "formula robot"
                  git config user.email "ceejceej@gmail.com"
                  git commit -m "tale $REF_NAME"
                  git push https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/ceejbot/homebrew-tap.git
