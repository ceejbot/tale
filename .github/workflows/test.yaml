name: "Tests"
on:
    push:
        branches: ["latest"]
        paths:
            - src/**
            - fixtures/**
            - Cargo.toml
            - Cargo.lock
            - .github/workflows/test.yaml
    pull_request:
        branches: ["latest"]
    workflow_dispatch:
permissions:
    contents: read

env:
    CARGO_TERM_COLOR: always

jobs:
    test:
        name: test
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                persist-credentials: false

            - name: sccache-cache
              uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696

            - name: get rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
              with:
                  toolchain: stable
                  target: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu
                  components: clippy, rustfmt
                  cache-directories: |
                      ~/.cargo/registry
                      ~/.cargo/bin
                      target

            - name: consult Clippy
              run: cargo +stable clippy --all-targets

            - name: get cargo-nextest on path
              shell: bash
              run: |
                  if [[ -z $(which cargo-nextest) ]]; then
                    curl -sL https://get.nexte.st/latest/linux -o nextest.tgz
                    tar xfz nextest.tgz
                    mv cargo-nextest /home/runner/.cargo/bin
                  fi

            - name: run the tests
              run: cargo nextest run -- --skip no_ci

    fmt:
        name: formatting check
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                persist-credentials: false

            - name: Install nightly Rust
              uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
              with:
                  toolchain: nightly
                  components: rustfmt

            - name: check formatting
              run: cargo +nightly fmt --check --all
